name: build-deploy-dev
on:
  workflow_dispatch:
  push:
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "LICENCE"
      - "CODEOWNERS"
      - ".nais/alerts.yml"
      - ".github/workflows/alerts.yml"
      - ".github/dependabot.yml"
      - ".github/workflows/dependabot-auto-merge.yml"
    branches:
      - '**'
jobs:
  call-workflow:
    permissions:
      actions: read
      contents: write
      security-events: write
      id-token: write
    if: "(github.ref_name == 'main') || contains(github.event.head_commit.message, 'deploy:dev')"
    uses: navikt/pam-deploy/.github/workflows/deploy-dev.yml@v9
    with:
      JAVA_VERSION: 25
      NAIS_RESOURCE: .nais/naiserator.yml
      NAIS_VARS: .nais/naiserator-dev.json
      SKIP_DRAFT_RELEASE: ${{ github.ref_name != 'main' }}
